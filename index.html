<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nikita & Yulia — Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

/* ================= BASE ================= */

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Inter',sans-serif;
    background:#f7f3ed;
    color:#2c2c2c;
    overflow-x:hidden;
}

/* ================= INTRO ================= */

.intro{
    position:fixed;
    inset:0;
    background:#111;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:9999;
    animation:fadeOut 2.2s ease 2.4s forwards;
}

.intro h1{
    font-family:'Playfair Display';
    color:white;
    letter-spacing:5px;
    opacity:0;
    animation:fadeIn 1.6s ease forwards;
}

@keyframes fadeIn{
    from{opacity:0;transform:translateY(20px);}
    to{opacity:1;transform:none;}
}

@keyframes fadeOut{
    to{opacity:0;visibility:hidden;}
}

/* ================= HERO ================= */

.hero{
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    color:white;
    position:relative;
}

.hero::before{
    content:"";
    position:absolute;
    inset:0;
    background:
    linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.7)),
    url("hero.JPG");
    background-size:cover;
    background-position:center;
}

.hero-content{
    position:relative;
}

.hero-pre{
    letter-spacing:4px;
    text-transform:uppercase;
    margin-bottom:18px;
    opacity:.9;
}

.hero h1{
    font-family:'Playfair Display';
    font-size:clamp(3rem,7vw,6rem);
}

.hero p{
    margin-top:10px;
    letter-spacing:5px;
    opacity:.9;
}

/* ================= SECTION ================= */

section{
    padding:120px 0;
}

.container{
    width:min(92%,1100px);
    margin:auto;
}

/* ================= INVITE ================= */

.invite{
    text-align:center;
}

.invite p{
    font-family:'Playfair Display';
    font-size:clamp(1.8rem,3vw,3rem);
}

/* ================= DETAILS ================= */

.details{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:25px;
}

.card{
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 25px 70px rgba(0,0,0,.08);
    text-align:center;
}

/* ================= TIMER ================= */

.timer{
    background:#141414;
    color:white;
    text-align:center;
}

.grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:25px;
    margin-top:40px;
}

.box{
    font-size:3rem;
}

/* ================= LOCATION ================= */

.location-card{
    position:relative;
    border-radius:30px;
    overflow:hidden;
}

.location-card img{
    width:100%;
    height:650px;
    object-fit:cover;
}

.overlay{
    position:absolute;
    inset:0;
    display:flex;
    align-items:flex-end;
    padding:70px;
    background:linear-gradient(to top,rgba(0,0,0,.85),transparent);
    color:white;
}

/* ================= RSVP ================= */

input,select{
    width:100%;
    padding:14px;
    margin:10px 0;
    border-radius:12px;
    border:1px solid #ddd;
    font-family:'Inter';
}

button{
    width:100%;
    padding:16px;
    border:none;
    background:#b57a5a;
    color:white;
    border-radius:999px;
    cursor:pointer;
}

/* ================= MUSIC ================= */

.music-btn{
    position:fixed;
    right:20px;
    bottom:20px;
    width:56px;
    height:56px;
    border-radius:50%;
    border:none;
    background:white;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
    cursor:pointer;
    z-index:999;
}

/* ================= FADE ================= */

.fade{
    opacity:0;
    transform:translateY(40px) scale(.98);
    filter:blur(12px);
    transition:1.2s ease;
}

.fade.show{
    opacity:1;
    transform:none;
    filter:blur(0);
}

@media(max-width:768px){
    .details{grid-template-columns:1fr;}
    .grid{grid-template-columns:repeat(2,1fr);}
}

</style>
</head>

<body>

<!-- INTRO -->
<div class="intro">
    <h1>N & Y</h1>
</div>

<!-- HERO -->
<section class="hero">
<div class="hero-content">

<div class="hero-pre">Мы женимся 🎉</div>

<h1>Никита & Юлия</h1>

<p>13 • 08 • 2026</p>

</div>
</section>

<!-- INVITE -->
<section class="invite fade">
<div class="container">
<p>Мы нашли своё счастье и хотим разделить этот день с вами.</p>
</div>
</section>

<!-- DETAILS -->
<section class="fade">
<div class="container">

<div class="details">

<div class="card">🕊<h3>Сбор гостей</h3><p>12:00</p></div>
<div class="card">💒<h3>Церемония</h3><p>12:30</p></div>

</div>

</div>
</section>

<!-- TIMER -->
<section class="timer fade">
<div class="container">

<h2>До свадьбы осталось</h2>

<div class="grid">
<div><div class="box" id="d">0</div><div>дней</div></div>
<div><div class="box" id="h">0</div><div>часов</div></div>
<div><div class="box" id="m">0</div><div>минут</div></div>
<div><div class="box" id="s">0</div><div>секунд</div></div>
</div>

</div>
</section>

<!-- LOCATION -->
<section class="fade">
<div class="container">

<div class="location-card">

<img src="001.jpg">

<div class="overlay">
<div>
<h2>Москва, Большая Якиманка, 15</h2>
<a href="https://yandex.ru/maps/?text=Москва+Большая+Якиманка+15"
target="_blank"
style="display:inline-block;margin-top:15px;padding:14px 28px;background:#b57a5a;color:white;border-radius:999px;text-decoration:none;">
Маршрут
</a>
</div>
</div>

</div>

</div>
</section>

<!-- RSVP -->
<section class="fade">
<div class="container" style="text-align:center;">

<h2 style="font-family:'Playfair Display';margin-bottom:25px;">Вы с нами?</h2>

<input id="name" placeholder="Ваше имя">

<select id="attend">
<option value="">Подтвердите Ваше присутствие?</option>
<option value="Да">Да</option>
<option value="Нет">Нет</option>
</select>

<select id="people">
<option value="">Гостей</option>
<option>1</option>
<option>2</option>
<option>3+</option>
</select>

<button onclick="send()">Отправить в WhatsApp</button>

</div>
</section>

<footer style="text-align:center;padding:40px;opacity:.6;">
С любовью, Никита и Юлия © 2026
</footer>

<!-- MUSIC -->
<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/10/25/audio_7c4b2b7a3a.mp3">
</audio>

<button class="music-btn" id="musicBtn">🎵</button>

<script>

/* TIMER */
const date=new Date("2026-08-13T12:00:00");

setInterval(()=>{
let d=date-new Date();
document.getElementById("d").textContent=Math.floor(d/86400000);
document.getElementById("h").textContent=Math.floor(d/3600000)%24;
document.getElementById("m").textContent=Math.floor(d/60000)%60;
document.getElementById("s").textContent=Math.floor(d/1000)%60;
},1000);

/* FADE */
const els=document.querySelectorAll(".fade");

const obs=new IntersectionObserver(e=>{
e.forEach(x=>{
if(x.isIntersecting)x.target.classList.add("show");
});
},{threshold:.15});

els.forEach(e=>obs.observe(e));

/* RSVP */
function send(){

const name=document.getElementById("name").value;
const attend=document.getElementById("attend").value;
const people=document.getElementById("people").value;

const text=`Я ${name}, ответ: ${attend}, гостей: ${people}`;

window.open("https://wa.me/79166299089?text="+encodeURIComponent(text));

}

/* MUSIC */
const music=document.getElementById("music");
const btn=document.getElementById("musicBtn");

let play=false;

btn.onclick=()=>{
play=!play;
music.volume=0.25;
play?music.play():music.pause();
};

window.addEventListener("click",()=>{
if(!play){
music.volume=0.25;
music.play();
play=true;
}
},{once:true});

</script>

</body>
</html>
